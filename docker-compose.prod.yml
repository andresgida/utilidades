version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: utilidades-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - utilidades-network
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: utilidades-backend-prod
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT__Secret: ${JWT__Secret}
      JWT__Issuer: ${JWT__Issuer}
      JWT__Audience: ${JWT__Audience}
    depends_on:
      - postgres
    networks:
      - utilidades-network
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: utilidades-frontend-prod
    restart: always
    depends_on:
      - backend
    networks:
      - utilidades-network

  nginx:
    image: nginx:alpine
    container_name: utilidades-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - utilidades-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  utilidades-network:
    driver: bridge
